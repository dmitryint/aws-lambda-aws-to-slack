name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build bootstrap
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          cd cmd/aws-to-slack
          go build -mod=vendor -trimpath \
            -ldflags "-X main.revision=${GITHUB_REF_NAME} -s -w" \
            -o ../../dist/bootstrap

      - name: Package zip
        run: |
          cd dist
          zip -9 "lambda-aws-to-slack_${{ steps.version.outputs.version }}_linux_${{ matrix.goarch }}.zip" bootstrap
          rm bootstrap
          sha256sum "lambda-aws-to-slack_${{ steps.version.outputs.version }}_linux_${{ matrix.goarch }}.zip" \
            > "lambda-aws-to-slack_${{ steps.version.outputs.version }}_linux_${{ matrix.goarch }}.zip.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/lambda-aws-to-slack_${{ steps.version.outputs.version }}_linux_${{ matrix.goarch }}.zip
            dist/lambda-aws-to-slack_${{ steps.version.outputs.version }}_linux_${{ matrix.goarch }}.zip.sha256
          fail_on_unmatched_files: true
