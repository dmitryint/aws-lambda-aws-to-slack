name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: tidy is clean
        run: |
          make tidy
          git diff --exit-code

      - name: fmt is clean
        run: |
          make fmt
          git diff --exit-code

      - name: vet
        run: make vet

      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: test
        run: make test

      - name: package
        run: make package

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: tofu fmt
        run: tofu fmt -recursive -check examples/

      - name: tofu validate
        working-directory: examples/lambda
        run: |
          tofu init -backend=false
          tofu validate
